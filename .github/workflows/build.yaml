name: Build and Test

on:
    pull_request:
        types: [ opened, synchronize, reopened, closed ]
        branches:
            - "release/**"
            - "feature/**"
            - "bugfix/**"
            - "fix/**"

env:
    REGISTRY: ghcr.io
    REGISTRY_USER: ${{ github.actor }}
    REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
    NAME: ${{ github.repository }}
    BUILDER_TAG: ${{ github.ref_name }}
    DOCKER_BUILDKIT: "1"

concurrency:
    group: push-workflow
    cancel-in-progress: false

permissions:
    contents: write
    id-token: write
    packages: write

jobs:
    build_amd64:
        runs-on: [ self-hosted, X64 ]
        timeout-minutes: 720
        steps:
            - uses: actions/checkout@v6
            - name: Set up QEMU
              uses: docker/setup-qemu-action@v4
              with:
                  platforms: all
            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4
            - name: Login to GHCR
              uses: docker/login-action@v4
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}
            - name: Dry Build Docker Image
              uses: docker/build-push-action@v7
              with:
                  push: true
                  platforms: linux/amd64
                  tags: ${{ env.REGISTRY }}/${{ env.NAME }}:amd64-tmp
                  cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.NAME
                      }}:amd64-cacheimage
                  cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.NAME
                      }}:amd64-cacheimage,mode=max
                  annotations: |
                      arch=amd64
    build_arm64:
        runs-on: [ self-hosted, ARM64 ]
        timeout-minutes: 720
        steps:
            - uses: actions/checkout@v6
            - name: Set up QEMU
              uses: docker/setup-qemu-action@v4
              with:
                  platforms: all
            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4
            - name: Login to GHCR
              uses: docker/login-action@v4
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}
            - name: Dry Build Docker Image
              uses: docker/build-push-action@v7
              with:
                  push: true
                  platforms: linux/arm64
                  tags: ${{ env.REGISTRY }}/${{ env.NAME }}:arm64-tmp
                  cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.NAME
                      }}:arm64-cacheimage
                  cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.NAME
                      }}:arm64-cacheimage,mode=max
                  annotations: |
                      arch=arm64

    bump-version:
        runs-on: [ self-hosted, X64 ]
        if: github.event.pull_request.merged == true
        needs:
            - build_amd64
            - build_arm64
        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0
                  ref: ${{ github.ref }}
            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: "lts/*"
            - name: Install modules
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  npm install --save-dev @semantic-release/changelog \
                      @semantic-release/commit-analyzer \
                      @semantic-release/release-notes-generator \
                      @semantic-release/github \
                      @semantic-release/git \
                      conventional-changelog-conventionalcommits
            - name: Automatic Release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  npx semantic-release
