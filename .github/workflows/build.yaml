name: Build and Test

on:
    pull_request:
        types: [ opened, synchronize, reopened, ready_for_review ]
        branches:
            - main
    push:
        branches:
            - "!main"
env:
    REGISTRY: ghcr.io
    REGISTRY_USER: ${{ github.actor }}
    REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
    NAME: ${{ github.repository }}
    BUILDER_TAG: ${{ github.ref_name }}
    DOCKER_BUILDKIT: "1"

concurrency:
    group: ci-${{ github.workflow }}-${{ github.event.pull_request.number ||
        github.ref }}
    cancel-in-progress: true

permissions:
    contents: write
    id-token: write
    packages: write

jobs:
    build-amd64:
        runs-on: [ self-hosted, X64 ]
        timeout-minutes: 720
        steps:
            - uses: actions/checkout@v6
            - name: Compute image name
              id: image
              env:
                  REPOSITORY: ${{ github.repository }}
              run: echo "name=ghcr.io/${REPOSITORY,,}" >> "$GITHUB_OUTPUT"
            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4
            - name: Login to GHCR
              uses: docker/login-action@v4
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}
            - name: Dry Build Docker Image
              uses: docker/build-push-action@v7
              with:
                  push: true
                  tags: |
                      ${{ steps.image.outputs.name }}:amd64-tmp
                  cache-from: |
                      type=registry,ref=${{ steps.image.outputs.name }}:amd64-cacheimage
                  cache-to: |
                      type=registry,ref=${{ steps.image.outputs.name }}:amd64-cacheimage,mode=max
                  annotations: |
                      arch=amd64
    build-arm64:
        runs-on: [ self-hosted, ARM64 ]
        timeout-minutes: 720
        steps:
            - uses: actions/checkout@v6
            - name: Compute image name
              id: image
              env:
                  REPOSITORY: ${{ github.repository }}
              run: echo "name=ghcr.io/${REPOSITORY,,}" >> "$GITHUB_OUTPUT"
            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4
            - name: Login to GHCR
              uses: docker/login-action@v4
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}
            - name: Dry Build Docker Image
              uses: docker/build-push-action@v7
              with:
                  push: true
                  tags: |
                      ${{ steps.image.outputs.name }}:arm64-tmp
                  cache-from: |
                      type=registry,ref=${{ steps.image.outputs.name }}:arm64-cacheimage
                  cache-to: |
                      type=registry,ref=${{ steps.image.outputs.name }}:arm64-cacheimage,mode=max
                  annotations: |
                      arch=arm64
