name: Release

on:
    push:
        tags:
            - "**"
env:
    REGISTRY: ghcr.io
    REGISTRY_USER: ${{ github.actor }}
    REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
    NAME: ${{ github.repository }}
    BUILDER_TAG: ${{ github.ref_name }}
    DOCKER_BUILDKIT: "1"

concurrency:
    group: release-workflow
    cancel-in-progress: false

permissions:
    contents: write
    id-token: write
    packages: write

jobs:
    release_amd64:
        runs-on: [ self-hosted, X64 ]
        if: startsWith(github.ref, 'refs/tags/')
        steps:
            - name: Tag Name
              id: tag-name
              run: |
                  if [ "${{ github.event_name }}" = "release" ]; then
                      echo "tag=$(basename "${{ github.ref}}")" >> $GITHUB_OUTPUT
                  fi
            - name: Compute image name
              id: image
              env:
                  REPOSITORY: ${{ github.repository }}
              run: echo "name=ghcr.io/${REPOSITORY,,}" >> "$GITHUB_OUTPUT"
            - uses: actions/checkout@v6
            - name: Set up QEMU
              uses: docker/setup-qemu-action@v4
              with:
                  platforms: linux/amd64
            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4
            - name: Login to GHCR
              uses: docker/login-action@v4
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}
            - name: Dry Build Docker Image
              uses: docker/build-push-action@v7
              with:
                  push: true
                  platforms: linux/amd64
                  tags: |
                      ${{ steps.image.outputs.name }}:amd64-latest
                      ${{ steps.image.outputs.name }}:amd64-${{ steps.tag-name.outputs.tag }}
                  cache-from: |
                      type=registry,ref=${{ steps.image.outputs.name }}:amd64-cacheimage
                  cache-to: |
                      type=registry,ref=${{ steps.image.outputs.name }}:amd64-cacheimage,mode=max
                  annotations: |
                      arch=amd64

    release_arm64:
        runs-on: [ self-hosted, ARM64 ]
        if: startsWith(github.ref, 'refs/tags/')
        steps:
            - name: Tag Name
              id: tag-name
              run: |
                  if [ "${{ github.event_name }}" = "release" ]; then
                      echo "tag=$(basename "${{ github.ref}}")" >> $GITHUB_OUTPUT
                  fi
            - name: Compute image name
              id: image
              env:
                  REPOSITORY: ${{ github.repository }}
              run: echo "name=ghcr.io/${REPOSITORY,,}" >> "$GITHUB_OUTPUT"
            - uses: actions/checkout@v6
            - name: Set up QEMU
              uses: docker/setup-qemu-action@v4
              with:
                  platforms: linux/arm64
            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4
            - name: Login to GHCR
              uses: docker/login-action@v4
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}
            - name: Dry Build Docker Image
              uses: docker/build-push-action@v7
              with:
                  push: true
                  platforms: linux/arm64
                  tags: |
                      ${{ steps.image.outputs.name }}:arm64-latest
                      ${{ steps.image.outputs.name }}:arm64-${{ steps.tag-name.outputs.tag }}
                  cache-from: |
                      type=registry,ref=${{ steps.image.outputs.name }}:arm64-cacheimage
                  cache-to: |
                      type=registry,ref=${{ steps.image.outputs.name }}:arm64-cacheimage,mode=max
                  annotations: |
                      arch=arm64
    release:
        runs-on: [ self-hosted, X64 ]
        if: startsWith(github.ref, 'refs/tags/')
        needs:
            - release_amd64
            - release_arm64
        steps:
            - name: Tag Name
              id: tag-name
              run: |
                  if [ "${{ github.event_name }}" = "release" ]; then
                      echo "tag=$(basename "${{ github.ref}}")" >> $GITHUB_OUTPUT
                  fi
            - name: Compute image name
              id: image
              env:
                  REPOSITORY: ${{ github.repository }}
              run: echo "name=ghcr.io/${REPOSITORY,,}" >> "$GITHUB_OUTPUT"
            - uses: actions/checkout@v6
            - name: Set up QEMU
              uses: docker/setup-qemu-action@v4
              with:
                  platforms: linux/amd64,linux/arm64
            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4
            - name: Login to GHCR
              uses: docker/login-action@v4
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}
            - name: Create multiplatform manifest and push
              shell: bash
              run: |
                  set -e
                  docker buildx imagetools create \
                      --tag ${{ steps.image.outputs.name }}:latest \
                      --tag ${{ steps.image.outputs.name }}:${{ steps.tag-name.outputs.tag }} \
                      --amend ${{ steps.image.outputs.name }}:amd64-${{ steps.tag-name.outputs.tag }} \
                      --amend ${{ steps.image.outputs.name }}:arm64-${{ steps.tag-name.outputs.tag }}

                  docker push ${{ steps.image.outputs.name }}:latest
                  docker push ${{ steps.image.outputs.name }}:${{ steps.tag-name.outputs.tag }}
