name: Release

on:
    release:
        types: [ published ]
env:
    REGISTRY: ghcr.io
    REGISTRY_USER: ${{ github.actor }}
    REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
    NAME: ${{ github.repository }}
    BUILDER_TAG: ${{ github.ref_name }}
    DOCKER_BUILDKIT: "1"

concurrency:
    group: release-workflow-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: false

permissions:
    contents: write
    id-token: write
    packages: write

jobs:
    release-amd64:
        runs-on: [ self-hosted, X64 ]
        timeout-minutes: 720
        if: startsWith(github.ref, 'refs/tags/')
        steps:
            - name: Tag Name
              id: tag-name
              run: |
                  echo "tag=$(basename "${{ github.ref}}")" >> $GITHUB_OUTPUT
            - name: Compute image name
              id: image
              env:
                  REPOSITORY: ${{ github.repository }}
              run: echo "name=ghcr.io/${REPOSITORY,,}" >> "$GITHUB_OUTPUT"
            - uses: actions/checkout@v6
            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4
            - name: Login to GHCR
              uses: docker/login-action@v4
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}
            - name: Dry Build Docker Image
              uses: docker/build-push-action@v7
              with:
                  push: true
                  tags: |
                      ${{ steps.image.outputs.name }}:amd64-latest
                      ${{ steps.image.outputs.name }}:amd64-${{ steps.tag-name.outputs.tag }}
                  cache-from: |
                      type=registry,ref=${{ steps.image.outputs.name }}:amd64-cacheimage
                  cache-to: |
                      type=registry,ref=${{ steps.image.outputs.name }}:amd64-cacheimage,mode=max
                  annotations: |
                      arch=amd64

    release-arm64:
        timeout-minutes: 720
        runs-on: [ self-hosted, linux, ARM64 ]
        if: startsWith(github.ref, 'refs/tags/')
        steps:
            - name: Tag Name
              id: tag-name
              run: |
                echo "tag=$(basename "${{ github.ref}}")" >> $GITHUB_OUTPUT
            - name: Compute image name
              id: image
              env:
                  REPOSITORY: ${{ github.repository }}
              run: echo "name=ghcr.io/${REPOSITORY,,}" >> "$GITHUB_OUTPUT"
            - uses: actions/checkout@v6
            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4
            - name: Login to GHCR
              uses: docker/login-action@v4
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}
            - name: Dry Build Docker Image
              uses: docker/build-push-action@v7
              with:
                  push: true
                  tags: |
                      ${{ steps.image.outputs.name }}:arm64-latest
                      ${{ steps.image.outputs.name }}:arm64-${{ steps.tag-name.outputs.tag }}
                  cache-from: |
                      type=registry,ref=${{ steps.image.outputs.name }}:arm64-cacheimage
                  cache-to: |
                      type=registry,ref=${{ steps.image.outputs.name }}:arm64-cacheimage,mode=max
                  annotations: |
                      arch=arm64
    release:
        timeout-minutes: 720
        runs-on: [ self-hosted, linux, X64 ]
        if: startsWith(github.ref, 'refs/tags/')
        needs:
            - release-amd64
            - release-arm64
        steps:
            - name: Tag Name
              id: tag-name
              run: |
                echo "tag=$(basename "${{ github.ref}}")" >> $GITHUB_OUTPUT
            - name: Compute image name
              id: image
              env:
                  REPOSITORY: ${{ github.repository }}
              run: echo "name=ghcr.io/${REPOSITORY,,}" >> "$GITHUB_OUTPUT"
            - uses: actions/checkout@v6
            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4
            - name: Login to GHCR
              uses: docker/login-action@v4
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}
            - name: Create multiplatform manifest and push
              shell: bash
              run: |
                  set -e
                  docker buildx imagetools create \
                      -t ${{ steps.image.outputs.name }}:${{ steps.tag-name.outputs.tag }} \
                      ${{ steps.image.outputs.name }}:amd64-${{ steps.tag-name.outputs.tag }} \
                      ${{ steps.image.outputs.name }}:arm64-${{ steps.tag-name.outputs.tag }}

                  docker buildx imagetools create \
                      -t ${{ steps.image.outputs.name }}:latest \
                      ${{ steps.image.outputs.name }}:amd64-${{ steps.tag-name.outputs.tag }} \
                      ${{ steps.image.outputs.name }}:arm64-${{ steps.tag-name.outputs.tag }}
