name: Build and Test

on:
    push:
        branches: [ main ]
    release:
        types: [ published ]

env:
    REGISTRY: ghcr.io
    REGISTRY_USER: ${{ github.actor }}
    REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
    NAME: ${{ github.repository }}
    BUILDER_TAG: ${{ github.ref_name }}
    DOCKER_BUILDKIT: "1"

concurrency:
    group: release-workflow
    cancel-in-progress: false

permissions:
    contents: write
    id-token: write
    packages: write

jobs:
    build:
        runs-on: self-hosted
        timeout-minutes: 720
        steps:
            - uses: actions/checkout@v6
            - name: Set up QEMU
              uses: docker/setup-qemu-action@v4
              with:
                  platforms: all
            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4
            - name: Login to GHCR
              uses: docker/login-action@v4
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}
            - name: Dry Build Docker Image
              uses: docker/build-push-action@v7
              with:
                  platforms: linux/amd64,linux/arm64
                  push: true
                  tags: ${{ env.REGISTRY }}/${{ env.NAME }}:tmp
                  cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.NAME }}:cacheimage
                  cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.NAME }}:cacheimage,mode=max

    bump-version:
        runs-on: self-hosted
        if: github.event_name != 'release'
        needs:
            - build
        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0
            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: "lts/*"
            - name: Install modules
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  npm install --save-dev @semantic-release/changelog \
                      @semantic-release/commit-analyzer \
                      @semantic-release/release-notes-generator \
                      @semantic-release/github \
                      @semantic-release/git \
                      conventional-changelog-conventionalcommits
            - name: Automatic Release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  npx semantic-release

    release:
        runs-on: self-hosted
        needs:
            - build
        if: github.event_name == 'release' && github.event.action == 'published'
        steps:
            - name: Tag Name
              id: tag-name
              run: |
                  if [ "${{ github.event_name }}" = "release" ]; then
                      echo "tag=$(basename "${{ github.ref}}")" >> $GITHUB_OUTPUT
                  fi
            - uses: actions/checkout@v6
            - name: Set up QEMU
              uses: docker/setup-qemu-action@v4
              with:
                  platforms: all
            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4
            - name: Login to GHCR
              uses: docker/login-action@v4
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}
            - name: Dry Build Docker Image
              uses: docker/build-push-action@v7
              with:
                  platforms: linux/amd64,linux/arm64
                  push: true
                  tags: |
                      ${{ env.REGISTRY }}/${{ env.NAME }}:latest
                      ${{ env.REGISTRY }}/${{ env.NAME }}:${{ steps.tag-name.outputs.tag }}
                  cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.NAME }}:cacheimage
                  cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.NAME }}:cacheimage,mode=max
